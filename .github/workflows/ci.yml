name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run validate-config

      - name: Smoke test
        run: npm run smoke
        env:
          GOOGLE_API_KEY: ""

      - run: npm run eval-fixtures
