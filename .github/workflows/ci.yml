name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run validate-config

      - name: Golden-path regressions
        run: npm run golden

      - name: P1 recovery matrix
        run: npm run recovery

      - name: P2 critical journey suite
        run: npm run journeys

      - name: P3 determinism
        run: npm run determinism

      - name: P4 continuity
        run: npm run continuity

      - name: Smoke test
        run: npm run smoke
        env:
          GOOGLE_API_KEY: ""

      - run: npm run eval-fixtures
