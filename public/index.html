<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Guidance Assistant</title>
  <style>
    :root {
      --primary: #4a90d9;
      --primary-dark: #357abd;
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #333333;
      --text-light: #777777;
      --border: #e1e5eb;
      --user-bubble: #4a90d9;
      --bot-bubble: #ffffff;
      --accent: #27ae60;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .header .subtitle {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 2px;
    }

    .phase-badge {
      background: rgba(255,255,255,0.15);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .phase-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* Chat Area */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 80%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.bot .message-avatar {
      background: linear-gradient(135deg, #4a90d9, #357abd);
      color: white;
    }

    .message.user .message-avatar {
      background: #e8eef6;
      color: var(--primary);
    }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .message.bot .message-bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .message.user .message-bubble {
      background: var(--user-bubble);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 8px 0;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #aaa;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* Input Area */
    .input-area {
      padding: 16px 24px;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    #messageInput {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 24px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      max-height: 120px;
      line-height: 1.4;
    }

    #messageInput:focus {
      border-color: var(--primary);
    }

    #messageInput::placeholder {
      color: #aaa;
    }

    .send-btn {
      width: 44px;
      height: 44px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }

    .send-btn:hover { background: var(--primary-dark); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { background: #ccc; cursor: not-allowed; }

    .send-btn svg {
      width: 20px;
      height: 20px;
    }

    .export-btn {
      padding: 10px 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .export-btn:hover { background: #219a52; }
    .export-btn:disabled { background: #ccc; cursor: not-allowed; }

    /* Welcome Screen */
    .welcome {
      text-align: center;
      padding: 40px;
      color: var(--text-light);
    }

    .welcome h2 {
      font-size: 22px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .welcome p {
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .start-btn {
      padding: 14px 32px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 28px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .start-btn:hover { background: var(--primary-dark); }
    .start-btn:active { transform: scale(0.97); }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
    }

    .toast.show { opacity: 1; }

    /* Responsive */
    @media (max-width: 600px) {
      .message { max-width: 90%; }
      .header h1 { font-size: 16px; }
      .phase-badge { font-size: 11px; padding: 4px 10px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <div class="header-icon">&#x1F3AF;</div>
      <div>
        <h1>Career Guidance Assistant</h1>
        <div class="subtitle">AI-powered career planning</div>
      </div>
    </div>
    <div class="phase-badge" id="phaseBadge">
      <span class="phase-dot"></span>
      <span id="phaseText">Ready</span>
    </div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcomeScreen">
      <h2>Welcome to Career Guidance Assistant</h2>
      <p>I'll help you explore career paths, identify skill gaps,<br>and build a personalized action plan.</p>
      <button class="start-btn" onclick="startSession()">Start Conversation</button>
    </div>
  </div>

  <div class="input-area" id="inputArea" style="display: none;">
    <div class="input-wrapper">
      <textarea id="messageInput" placeholder="Type your message..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
    <button class="export-btn" id="exportBtn" onclick="exportReport()">Export Report</button>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = window.location.origin;
    let sessionId = null;
    let isWaiting = false;

    async function startSession() {
      document.getElementById('welcomeScreen').remove();
      document.getElementById('inputArea').style.display = 'flex';

      showTyping();

      try {
        const res = await fetch(`${API}/api/session`, { method: 'POST' });
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        sessionId = data.sessionId;
        removeTyping();
        addMessage('bot', data.message);
        updatePhase(data.phase);
        document.getElementById('messageInput').focus();
      } catch (e) {
        removeTyping();
        addMessage('bot', 'Sorry, I had trouble starting. Please refresh and try again.');
        showToast('Connection error: ' + e.message);
      }
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || isWaiting || !sessionId) return;

      input.value = '';
      input.style.height = 'auto';
      addMessage('user', text);
      setWaiting(true);
      showTyping();

      try {
        const res = await fetch(`${API}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId, message: text }),
        });
        const data = await res.json();

        removeTyping();

        if (data.error) throw new Error(data.error);

        addMessage('bot', data.message);
        updatePhase(data.phase);

        if (data.isComplete) {
          showToast('Session complete! Click "Export Report" to download your career plan.');
        }
      } catch (e) {
        removeTyping();
        addMessage('bot', 'I encountered an error. Please try again.');
        showToast('Error: ' + e.message);
      }

      setWaiting(false);
      input.focus();
    }

    async function exportReport() {
      if (!sessionId) return;

      const btn = document.getElementById('exportBtn');
      btn.disabled = true;
      btn.textContent = 'Generating...';

      try {
        const res = await fetch(`${API}/api/export`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sessionId }),
        });
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        // Open HTML report in new tab
        window.open(`${API}${data.html}`, '_blank');
        showToast('Report generated! Opening in new tab...');

        addMessage('bot', 'Your career plan report has been generated! It should have opened in a new tab. You can also download the PDF version.');
      } catch (e) {
        showToast('Export error: ' + e.message);
      }

      btn.disabled = false;
      btn.textContent = 'Export Report';
    }

    function addMessage(role, text) {
      const container = document.getElementById('chatContainer');
      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = role === 'bot' ? '\u{1F3AF}' : '\u{1F464}';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.textContent = text;

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
    }

    function showTyping() {
      const container = document.getElementById('chatContainer');
      const msg = document.createElement('div');
      msg.className = 'message bot';
      msg.id = 'typingMsg';

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = '\u{1F3AF}';

      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typingMsg');
      if (el) el.remove();
    }

    function updatePhase(phase) {
      const phaseNames = {
        orientation: 'Getting to Know You',
        exploration_career: 'Exploring Careers',
        exploration_role_targeting: 'Assessing Skills',
        planning: 'Building Your Plan',
      };
      document.getElementById('phaseText').textContent = phaseNames[phase] || phase;
    }

    function setWaiting(val) {
      isWaiting = val;
      document.getElementById('sendBtn').disabled = val;
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Auto-resize textarea
    document.getElementById('messageInput')?.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
  </script>
</body>
</html>
